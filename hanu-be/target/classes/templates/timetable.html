<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANU Timetable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode: "class" }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }

        .course-block {
            position: absolute;
            border-radius: 12px;
            padding: 12px;
            color: white;
            box-shadow: 0 4px 15px rgba(26, 35, 126, 0.25);
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .course-block:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(26, 35, 126, 0.35);
        }
    </style>
</head>
<body class="bg-[#f9f9f9]">

<header class="bg-white px-8 py-5 border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="text-2xl font-bold text-[#1A237E]">HANU Automatic Registration</div>
        <nav class="flex gap-10 text-sm font-medium">
            <a href="/dashboard" class="hover:text-[#1A237E]">Dashboard</a>
            <a href="/courses/search" class="hover:text-[#1A237E]">Course Search</a>
            <a href="/timetable" class="text-[#1A237E] font-bold border-b-2 border-[#1A237E] pb-1">Timetable</a>
            <a href="#" class="hover:text-[#1A237E]">History</a>
        </nav>
        <div class="flex items-center gap-4">
            <span class="text-sm font-medium" th:text="${session.studentId}"></span>
            <a href="/logout" class="text-red-600 hover:text-red-700">
                <span class="material-symbols-outlined">logout</span>
            </a>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-8 py-10">

    <div class="flex justify-between items-end mb-10">
        <div>
            <h1 class="text-4xl font-bold tracking-tight">Timetable</h1>
            <p class="text-gray-600 mt-1" id="weekDisplay">Tuần <span id="weekNum" class="font-semibold">8</span> • Tháng 4/2026</p>
        </div>

        <div class="flex items-center gap-4 bg-white shadow-sm rounded-3xl p-2">
            <button onclick="prevWeek()"
                    class="px-6 py-3 hover:bg-gray-100 rounded-2xl transition flex items-center gap-2">
                ← Tuần trước
            </button>
            <button onclick="goToCurrentWeek()"
                    class="px-8 py-3 bg-[#1A237E] text-white rounded-3xl font-medium hover:bg-blue-800 transition">
                Tuần hiện tại
            </button>
            <button onclick="nextWeek()"
                    class="px-6 py-3 hover:bg-gray-100 rounded-2xl transition flex items-center gap-2">
                Tuần sau →
            </button>
        </div>
    </div>

    <!-- Timetable -->
    <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
        <div class="grid grid-cols-7 bg-gray-50 text-center font-semibold">
            <div class="p-6 border-r">Giờ học</div>
            <div class="p-6">Thứ 2</div>
            <div class="p-6">Thứ 3</div>
            <div class="p-6">Thứ 4</div>
            <div class="p-6">Thứ 5</div>
            <div class="p-6">Thứ 6</div>
            <div class="p-6">Thứ 7</div>
        </div>

        <div id="timetableContainer" class="relative grid grid-cols-7" style="grid-template-rows: repeat(6, 92px);">
            <!-- Time labels -->
            <div class="col-span-1 border-r bg-gray-50 divide-y text-sm font-medium">
                <div class="h-[92px] flex items-center justify-center">07:20</div>
                <div class="h-[92px] flex items-center justify-center">09:20</div>
                <div class="h-[92px] flex items-center justify-center">12:20</div>
                <div class="h-[92px] flex items-center justify-center">14:30</div>
                <div class="h-[92px] flex items-center justify-center">17:00</div>
                <div class="h-[92px] flex items-center justify-center">19:00</div>
            </div>
        </div>
    </div>

    <!-- Debug -->
    <div class="mt-10 bg-gray-100 p-6 rounded-2xl text-xs">
        <strong>Debug - Số môn đã đăng ký:</strong> <span th:text="${timetableCourses.size()}" class="font-bold"></span><br><br>
        <div th:each="course : ${timetableCourses}" class="mt-1">
            • <span th:text="${course.courseCode}"></span> —
            <span th:text="${course.scheduleTime}" class="text-gray-500"></span>
        </div>
    </div>

</main>

<script th:inline="javascript">
    const courses = /*[[${timetableCourses}]]*/ [];

    // Ánh xạ tiết → vị trí thực tế
    const periodToRow = {
        1: 1, 2: 2,                    // Ca sáng: 7:20 - 9:20
        3: 3, 4: 4,                    // Ca trưa/chiều: 12:20 - 14:30
        5: 5, 6: 6, 7: 6, 8: 6,        // Ca tối: 17:00 - 19:00
        9: 6, 10: 6, 11: 6, 12: 6      // Tiết cao hơn vẫn rơi vào ca tối
    };

    function parseSchedule(scheduleTime) {
        if (!scheduleTime) return [];
        const slots = [];
        const lines = scheduleTime.toString().split(/<br>|<hr>|\n/i);

        lines.forEach(line => {
            let text = line.replace(/<[^>]+>/g, ' ').trim();
            if (!text) return;

            const match = text.match(/Th[ứu]?\s*(\d+).*?[Tt]iết\s*(\d+)[-\s>–]+(\d+)/i);
            if (match) {
                const day = parseInt(match[1]);
                const start = parseInt(match[2]);
                const end = parseInt(match[3]);

                const startRow = periodToRow[start] || 1;
                let endRow = periodToRow[end] || startRow;

                if (day >= 2 && day <= 7) {
                    slots.push({
                        day: day,
                        startRow: startRow,
                        endRow: Math.max(startRow, endRow)
                    });
                }
            }
        });
        return slots;
    }

    function renderTimetable() {
        const container = document.getElementById('timetableContainer');

        Array.from(container.children).forEach(child => {
            if (child.classList.contains('col-span-1')) return;
            child.remove();
        });

        let rendered = 0;

        courses.forEach(course => {
            const slots = parseSchedule(course.scheduleTime);
            slots.forEach(slot => {
                rendered++;
                const block = document.createElement('div');
                block.className = 'course-block';
                block.style.backgroundColor = '#1A237E';
                block.style.left = '10px';
                block.style.right = '10px';
                block.style.top = `${(slot.startRow - 1) * 92 + 8}px`;
                block.style.height = `${(slot.endRow - slot.startRow + 1) * 92 - 16}px`;

                block.innerHTML = `
                    <div class="font-bold">${course.courseCode}</div>
                    <div class="text-xs mt-1 opacity-90">${course.courseName || ''}</div>
                `;

                block.style.gridColumn = `${slot.day} / span 1`;
                container.appendChild(block);
            });
        });
    }

    // ==================== CHỨC NĂNG TUẦN + THÁNG THỰC TẾ ====================
    let currentWeek = 8;

    function getMonthFromWeek(week) {
        const months = [
            "Tháng 1", "Tháng 1", "Tháng 1", "Tháng 2", "Tháng 2", "Tháng 2", "Tháng 2",
            "Tháng 3", "Tháng 3", "Tháng 3", "Tháng 3", "Tháng 4", "Tháng 4", "Tháng 4",
            "Tháng 5", "Tháng 5", "Tháng 5", "Tháng 5", "Tháng 6", "Tháng 6", "Tháng 6",
            "Tháng 7", "Tháng 7", "Tháng 7", "Tháng 7", "Tháng 8", "Tháng 8", "Tháng 8",
            "Tháng 9", "Tháng 9", "Tháng 9", "Tháng 10", "Tháng 10", "Tháng 10", "Tháng 10",
            "Tháng 11", "Tháng 11", "Tháng 11", "Tháng 12", "Tháng 12", "Tháng 12"
        ];
        const monthName = months[Math.min(week - 1, months.length - 1)];
        return `${monthName}/2026`;
    }

    function updateWeekDisplay() {
        document.getElementById('weekNum').textContent = currentWeek;
        document.getElementById('weekDisplay').innerHTML =
            `Tuần ${currentWeek} • ${getMonthFromWeek(currentWeek)}`;
    }

    function prevWeek() {
        if (currentWeek > 1) {
            currentWeek--;
            updateWeekDisplay();
            renderTimetable();
        }
    }

    function nextWeek() {
        currentWeek++;
        updateWeekDisplay();
        renderTimetable();
    }

    function goToCurrentWeek() {
        currentWeek = 8;
        updateWeekDisplay();
        renderTimetable();
    }

    // Khởi tạo
    window.onload = () => {
        renderTimetable();
        updateWeekDisplay();
    };
</script>

</body>
</html>
