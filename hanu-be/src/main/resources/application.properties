server.port=8080
spring.datasource.url=jdbc:h2:mem:hanudb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.thymeleaf.cache=false
# Scheduling
spring.task.scheduling.pool.size=2

# Jackson (for LocalDateTime serialization)
spring.jackson.serialization.write-dates-as-timestamps=false

# mock | real
app.registration.integration.mode=mock

# When get the real API, switch to:
# app.registration.integration.mode=real

app.registration.integration.base-url=
app.registration.integration.register-path=
app.registration.integration.availability-path=
app.registration.integration.course-detail-path=

# examples
# app.registration.integration.default-headers.X-Requested-With=XMLHttpRequest
# app.registration.integration.default-headers.Accept=application/json
# app.registration.integration.default-query-params.lang=vi