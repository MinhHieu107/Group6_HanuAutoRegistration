<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng nhập - HANU Auto Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; display: flex; align-items: center; min-height: 100vh; }
        .login-card { max-width: 420px; width: 100%; margin: auto; }
        .brand { font-weight: 800; color: #1a237e; }
        .btn-primary { background-color: #1a237e; border-color: #1a237e; }
        .btn-primary:hover { background-color: #000666; border-color: #000666; }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card card shadow-lg border-0 p-4">
        <div class="text-center mb-4">
            <h3 class="brand">HANU Auto Registration</h3>
            <p class="text-muted mb-0">Hệ thống đăng ký môn học tự động</p>
        </div>

        <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>
        <div th:if="${param.logout}" class="alert alert-success py-2">Đã đăng xuất thành công.</div>

        <form action="/login" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Tên đăng nhập (MSV)</label>
                <input type="text" name="studentId" class="form-control form-control-lg"
                       placeholder="Nhập mã sinh viên" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Mật khẩu</label>
                <input type="password" name="password" class="form-control form-control-lg"
                       placeholder="Nhập mật khẩu QLDT" required>
            </div>
            <button class="btn btn-primary btn-lg w-100 fw-bold" type="submit">Đăng nhập</button>
        </form>

        <hr class="my-3">
        <p class="text-center text-muted small mb-0">Dùng tài khoản QLDT Đại học Hà Nội</p>
    </div>
</div>
</body>
</html>
