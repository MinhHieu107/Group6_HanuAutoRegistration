<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANU Automatic Registration - Course Search</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class" }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        table { border-collapse: collapse; }
        th { font-weight: 600; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen">

<!-- Header -->
<header class="bg-[#f9f9f9] flex justify-between items-center w-full px-8 py-4 sticky top-0 z-50 border-b">
    <div class="text-xl font-bold tracking-tight text-[#1A237E]">
        HANU Automatic Registration
    </div>
    <nav class="hidden md:flex items-center gap-8">
        <a class="text-slate-600 font-medium hover:text-[#1A237E]" href="/dashboard">Dashboard</a>
        <a class="text-[#1A237E] font-bold border-b-2 border-[#1A237E] pb-1" href="/courses/search">Course Search</a>
        <a class="text-slate-600 font-medium hover:text-[#1A237E]" href="/timetable">Timetable</a>
        <a class="text-slate-600 font-medium hover:text-[#1A237E]" href="#">History</a>
    </nav>
    <div class="flex items-center gap-4">
        <button class="p-2 text-slate-600 hover:bg-[#f3f3f3] rounded-full transition-all">
            <span class="material-symbols-outlined">notifications</span>
        </button>
        <div class="flex items-center gap-3 pl-2 border-l">
            <div class="text-right hidden sm:block">
                <p class="text-sm font-bold" th:text="${session.studentId} ?: 'Guest'"></p>
            </div>
            <a href="/logout" class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-red-100">
                <span class="material-symbols-outlined text-red-600">logout</span>
            </a>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-8 py-10">

    <h1 class="text-4xl font-extrabold text-primary mb-2">Academic Course Search</h1>
    <p class="text-on-surface-variant mb-8">Browse and filter available courses for the current semester.</p>

    <!-- Bộ lọc -->
    <form id="filterForm" th:action="@{/courses/search}" method="get" class="flex flex-wrap gap-6 mb-8">
        <!-- Department -->
        <div>
            <label class="block text-sm font-medium mb-1">Department</label>
            <select name="department" onchange="this.form.submit()" class="border rounded-lg px-4 py-2 w-64">
                <option value="All" th:selected="${department == null or department == 'All'}">All</option>
                <option value="FIT (Informatics)" th:selected="${department == 'FIT (Informatics)'}">FIT (Informatics)</option>
                <option value="FIS (International Studies)" th:selected="${department == 'FIS (International Studies)'}">FIS (International Studies)</option>
                <option value="FENG (English)" th:selected="${department == 'FENG (English)'}">FENG (English)</option>
            </select>
        </div>

        <!-- Credits -->
        <div>
            <label class="block text-sm font-medium mb-1">Credits</label>
            <div class="flex gap-2">
                <button type="button" onclick="setFilter('creditsStr', '2 Credits')"
                        class="px-4 py-2 border rounded-lg hover:bg-gray-100 transition"
                        th:classappend="${creditsStr == '2 Credits'} ? 'bg-blue-600 text-white border-blue-600' : ''">
                    2 Credits
                </button>
                <button type="button" onclick="setFilter('creditsStr', '3 Credits')"
                        class="px-4 py-2 border rounded-lg hover:bg-gray-100 transition"
                        th:classappend="${creditsStr == '3 Credits'} ? 'bg-blue-600 text-white border-blue-600' : ''">
                    3 Credits
                </button>
                <button type="button" onclick="setFilter('creditsStr', '4 Credits')"
                        class="px-4 py-2 border rounded-lg hover:bg-gray-100 transition"
                        th:classappend="${creditsStr == '4 Credits'} ? 'bg-blue-600 text-white border-blue-600' : ''">
                    4 Credits
                </button>
            </div>
        </div>

        <!-- Status -->
        <div>
            <label class="block text-sm font-medium mb-1">Status</label>
            <div class="flex gap-2">
                <button type="button" onclick="setFilter('status', 'Open')"
                        class="px-4 py-2 border rounded-lg hover:bg-gray-100 transition"
                        th:classappend="${status == 'Open'} ? 'bg-emerald-600 text-white border-emerald-600' : ''">
                    Open
                </button>
                <button type="button" onclick="setFilter('status', 'Full')"
                        class="px-4 py-2 border rounded-lg hover:bg-gray-100 transition"
                        th:classappend="${status == 'Full'} ? 'bg-red-600 text-white border-red-600' : ''">
                    Full
                </button>
            </div>
        </div>

        <input type="hidden" name="keyword" th:value="${keyword}">
        <input type="hidden" name="availableOnly" th:value="${availableOnly}">
    </form>

    <!-- Bảng danh sách môn (đã xóa cột Course Name + style lại) -->
    <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b">
            <tr>
                <th class="text-left py-6 px-8 font-semibold">Code</th>
                <th class="text-left py-6 px-8 font-semibold">Cr</th>
                <th class="text-left py-6 px-8 font-semibold">Instructor</th>
                <th class="text-left py-6 px-8 font-semibold">Schedule</th>
                <th class="text-left py-6 px-8 font-semibold">Slots</th>
                <th class="text-center py-6 px-8 font-semibold w-28">Actions</th>
            </tr>
            </thead>
            <tbody class="divide-y">
            <tr th:each="course : ${courses}" class="hover:bg-gray-50 transition-colors">
                <td class="px-8 py-5 font-semibold" th:text="${course.courseCode}"></td>
                <td class="px-8 py-5 font-medium" th:text="${course.credits}"></td>
                <td class="px-8 py-5" th:text="${course.lecturer}"></td>
                <td class="px-8 py-5 text-sm" th:utext="${course.scheduleTime}"></td>
                <td class="px-8 py-5">
                    <span th:text="${course.enrolled} + '/' + ${course.capacity}"></span>
                    <span th:if="${course.hasSlots()}" class="ml-3 inline-block px-3 py-0.5 text-xs font-medium bg-emerald-100 text-emerald-700 rounded-full">Open</span>
                    <span th:unless="${course.hasSlots()}" class="ml-3 inline-block px-3 py-0.5 text-xs font-medium bg-red-100 text-red-700 rounded-full">Full</span>
                </td>
                <td class="px-8 py-5 text-center">
                    <button th:onclick="'addToQueue(' + ${course.id} + ')'"
                            class="px-6 py-2.5 text-sm font-medium bg-emerald-600 text-white rounded-2xl hover:bg-emerald-700 transition">
                        Add
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Không có dữ liệu -->
    <div th:if="${courses.isEmpty()}" class="mt-10 text-center py-12 text-gray-400">
        <p>Không có môn học nào. Vui lòng đồng bộ dữ liệu từ QLDT.</p>
    </div>

</main>

<script>
    function setFilter(name, value) {
        const form = document.getElementById('filterForm');
        let existing = form.querySelector(`input[name="${name}"]`);
        if (existing) existing.remove();

        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = name;
        input.value = value;
        form.appendChild(input);

        form.submit();
    }

    function addToQueue(courseId) {
        if (!confirm('Thêm môn này vào hàng đợi đăng ký?')) return;

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/queue/add';

        const input = document.createElement('input');
        input.type = 'hidden'; input.name = 'courseId'; input.value = courseId;
        form.appendChild(input);

        const pri = document.createElement('input');
        pri.type = 'hidden'; pri.name = 'priority'; pri.value = '1';
        form.appendChild(pri);

        document.body.appendChild(form);
        form.submit();
    }
</script>

</body>
</html>
