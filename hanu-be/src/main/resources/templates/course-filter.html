    function parseFlexibleDate(text) {
        const m = text.match(/^(\d{2})\/(\d{2})\/(\d{2}|\d{4})$/);
        if (!m) return null;

        const day = Number(m[1]);
        const month = Number(m[2]) - 1;
        let year = Number(m[3]);

        if (year < 100) year = 2000 + year;

        const d = new Date(year, month, day);
        d.setHours(0, 0, 0, 0);
        return d;
    }

    function parseDateRangeFromRaw(raw) {
        const matches = [...raw.matchAll(/(\d{2}\/\d{2}\/(?:\d{2}|\d{4}))/g)];

        if (matches.length === 0) return null;

        if (matches.length === 1) {
            const onlyDate = parseFlexibleDate(matches[0][1]);
            if (!onlyDate) return null;
            return { start: onlyDate, end: onlyDate };
        }

        const start = parseFlexibleDate(matches[0][1]);
        const end = parseFlexibleDate(matches[1][1]);

        if (!start || !end) return null;
        return { start, end };
    }

    function rangesOverlap(a, b) {
        if (!a || !b) return false;
        return a.start <= b.end && b.start <= a.end;
    }

    function periodsOverlap(a, b) {
        return a.start <= b.end && b.start <= a.end;
    }

    function parseScheduleEntries(scheduleText) {
        if (!scheduleText) return [];

        return scheduleText
            .split(/<hr\s*\/?>/i)
            .map(part => part.trim())
            .filter(part => part.length > 0)
            .map(part => {
                const match = part.match(/Thứ\s*(\d)\s*,\s*tiết\s*(\d+)\s*->\s*(\d+)/i);
                const dateRange = parseDateRangeFromRaw(part);

                if (!match) {
                    return {
                        day: null,
                        start: null,
                        end: null,
                        raw: part,
                        dateRange: dateRange
                    };
                }

                return {
                    day: Number(match[1]),
                    start: Number(match[2]),
                    end: Number(match[3]),
                    raw: part,
                    dateRange: dateRange
                };
            });
    }

    function collectPlacements(records) {
        const placements = [];

        for (const record of records || []) {
            const course = record.course || {};
            const entries = parseScheduleEntries(course.scheduleTime || '');

            for (const entry of entries) {
                if (!entry.day || !entry.start || !entry.end) continue;
                if (entry.day < 2 || entry.day > 7) continue;

                placements.push({
                    recordId: record.id,
                    priority: record.priority,
                    courseId: course.id,
                    courseCode: course.courseCode || '',
                    courseName: course.courseNameEn || course.groupName || '',
                    subGroup: course.subGroup || '',
                    day: entry.day,
                    start: entry.start,
                    end: entry.end,
                    raw: entry.raw,
                    dateRange: entry.dateRange
                });
            }
        }

        return placements;
    }

    function detectConflictIds(placements) {
        const conflictIds = new Set();

        for (let i = 0; i < placements.length; i++) {
            for (let j = i + 1; j < placements.length; j++) {
                const a = placements[i];
                const b = placements[j];

                if (a.day !== b.day) continue;
                if (!periodsOverlap(a, b)) continue;
                if (!rangesOverlap(a.dateRange, b.dateRange)) continue;

                conflictIds.add(a.recordId + '|' + a.day + '|' + a.start + '|' + a.end + '|' + a.raw);
                conflictIds.add(b.recordId + '|' + b.day + '|' + b.start + '|' + b.end + '|' + b.raw);
            }
        }

        return conflictIds;
    }

    function groupSharedSlotNonConflict(placements, conflictKeys) {
        const groups = new Map();

        placements.forEach(p => {
            const pKey = `${p.recordId}|${p.day}|${p.start}|${p.end}|${p.raw}`;
            if (conflictKeys.has(pKey)) return;

            const slotKey = `${p.day}|${p.start}|${p.end}`;
            if (!groups.has(slotKey)) groups.set(slotKey, []);
            groups.get(slotKey).push(p);
        });

        return groups;
    }

    function renderSplitBlock(parent, items, left, top, width, height) {
    const colors = ['tt-block-normal', 'tt-block-secondary', 'tt-block-tertiary'];
    const visibleItems = items.slice(0, 3);
    const partHeight = height / visibleItems.length;

    visibleItems.forEach((item, index) => {
        const block = document.createElement('div');
        block.className = `tt-block ${colors[index]}`;

        block.style.left = `${left}px`;
        block.style.top = `${top + index * partHeight}px`;
        block.style.width = `${width}px`;
        block.style.height = `${partHeight - 2}px`;

        const shortTime = `T${item.day} • ${item.start}-${item.end}`;

        block.innerHTML = `
            <div class="tt-block-title">${item.courseCode}</div>
            <div class="tt-block-sub">${item.courseName}</div>
            <div class="tt-block-sub">Nhóm: ${item.subGroup}</div>
            <div class="tt-block-time">${shortTime}</div>
        `;

        parent.appendChild(block);

}

    function renderVisualSchedule(records) {
        const overlay = document.getElementById('tt-overlay');
        const status = document.getElementById('schedule-status');
        overlay.innerHTML = '';

        if (!records || records.length === 0) {
            status.textContent = 'No course';
            status.className = 'text-xs font-semibold px-3 py-1 rounded-full bg-gray-100 text-gray-600';
            return;
        }

        const placements = collectPlacements(records);
        if (placements.length === 0) {
            status.textContent = 'No parsed schedule';
            status.className = 'text-xs font-semibold px-3 py-1 rounded-full bg-gray-100 text-gray-600';
            return;
        }

        const conflictKeys = detectConflictIds(placements);
        const sharedGroups = groupSharedSlotNonConflict(placements, conflictKeys);

        const rowHeight = 38;
        const overlayWidth = overlay.clientWidth;
        const dayWidth = overlayWidth / 6;

        let hasAnyConflict = conflictKeys.size > 0;
        const renderedNonConflictKeys = new Set();

        // render non-conflict shared slots as split blocks
        for (const [slotKey, items] of sharedGroups.entries()) {
            const [day, start, end] = slotKey.split('|').map(Number);
            const duration = end - start + 1;
            const left = (day - 2) * dayWidth + 4;
            const width = dayWidth - 8;
            const top = (start - 1) * rowHeight + 3;
            const height = duration * rowHeight - 6;

            if (items.length >= 2) {
                renderSplitBlock(overlay, items, left, top, width, height);

                items.slice(0, 3).forEach(item => {
                renderedNonConflictKeys.add(`${item.recordId}|${item.day}|${item.start}|${item.end}|${item.raw}`);
                });
            }
        }

        // render remaining placements
        placements.forEach((p) => {
            const pKey = `${p.recordId}|${p.day}|${p.start}|${p.end}|${p.raw}`;
            if (renderedNonConflictKeys.has(pKey)) return;

            const isConflict = conflictKeys.has(pKey);
            const block = document.createElement('div');
            block.className = `tt-block ${isConflict ? 'tt-block-conflict' : 'tt-block-normal'}`;

            const duration = p.end - p.start + 1;
            const left = (p.day - 2) * dayWidth + (isConflict ? 8 : 4);
            const width = dayWidth - (isConflict ? 14 : 8);
            const top = (p.start - 1) * rowHeight + (isConflict ? 6 : 3);
            const height = duration * rowHeight - (isConflict ? 8 : 6);

            block.style.left = `${left}px`;
            block.style.top = `${top}px`;
            block.style.width = `${width}px`;
            block.style.height = `${height}px`;

            block.innerHTML = `
                <div class="tt-block-title">${p.courseName}</div>
                <div class="tt-block-sub">(${p.courseCode})</div>
                <div class="tt-block-sub">Nhóm: ${p.subGroup}</div>
                <div class="tt-block-time">${p.raw}</div>
            `;

            overlay.appendChild(block);
        });

        if (hasAnyConflict) {
            status.textContent = 'Conflict';
            status.className = 'text-xs font-semibold px-3 py-1 rounded-full bg-red-100 text-red-700';
        } else {
            status.textContent = 'No conflict';
            status.className = 'text-xs font-semibold px-3 py-1 rounded-full bg-emerald-100 text-emerald-700';
        }
    }
